name: KaifangShared tests

on:
  pull_request:
    paths:
      - 'KaifangShared/**'
      - '.github/workflows/test-shared.yml'

jobs:
  test:
    name: Test KaifangShared (macOS)
    runs-on: macos-26
    defaults:
      run:
        working-directory: KaifangShared
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies

      - name: List schemes
        run: xcodebuild -list

      - name: Test KaifangCore
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme KaifangCore \
            -destination 'platform=macOS' \
            -enableCodeCoverage YES \
            -resultBundlePath KaifangCore.xcresult \
            | xcbeautify

      - name: Test KaifangPresentation
        if: always()
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme KaifangPresentation \
            -destination 'platform=macOS' \
            -enableCodeCoverage YES \
            -resultBundlePath KaifangPresentation.xcresult \
            | xcbeautify

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: KaifangShared-TestResults
          path: KaifangShared/*.xcresult
