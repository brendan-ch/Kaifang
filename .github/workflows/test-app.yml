name: App tests

on:
  pull_request:
    paths:
      - 'Kaifang/**'
      - 'Kaifang-Mac/**'
      - 'KaifangTests/**'
      - 'KaifangUITests/**'
      - 'Kaifang-MacTests/**'
      - 'Kaifang-MacUITests/**'
      - 'Kaifang.xcodeproj/**'
      - 'KaifangShared/**'
      - '.github/workflows/test-app.yml'

jobs:
  ios:
    name: iOS (Kaifang)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      - name: Show toolchain
        run: xcodebuild -version

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project Kaifang.xcodeproj -scheme Kaifang

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project Kaifang.xcodeproj \
            -scheme Kaifang \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=latest' \
            -enableCodeCoverage YES \
            -resultBundlePath ios-TestResults.xcresult \
            | xcbeautify

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-TestResults
          path: ios-TestResults.xcresult

  macos:
    name: macOS (Kaifang-Mac)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project Kaifang.xcodeproj -scheme Kaifang-Mac
    
      - name: Import certificate into keychain
        env:
          # The base64-encoded certificate exported from Keychain Access
          MACOS_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          
          # Password used to export the certificate from Keychain Access
          MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          
          # The full name of the certificate, e.g. "Developer ID Application: Your Name (K1234567)" or the SHA256 of the certificate
          MACOS_DEVELOPER_ID_CERTIFICATE_NAME: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_NAME }}
          
          # A random password of choice
          MACOS_CI_KEYCHAIN_RANDOM_PWD: ${{ secrets.MACOS_CI_KEYCHAIN_RANDOM_PWD }}

        run: |
          # Turn our base64-encoded certificate back to a regular .p12 file
          
          echo $MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 | base64 --decode > certificate.p12
 
          # We need to create a new keychain, otherwise using the certificate will prompt
          # with a UI dialog asking for the certificate password, which we can't
          # use in a headless CI environment
          
          security create-keychain -p "$MACOS_CI_KEYCHAIN_RANDOM_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_CI_KEYCHAIN_RANDOM_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /Applications/Xcode_26.2.app
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_CI_KEYCHAIN_RANDOM_PWD" build.keychain

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project Kaifang.xcodeproj \
            -scheme Kaifang-Mac \
            -destination 'platform=macOS' \
            -enableCodeCoverage YES \
            -resultBundlePath macos-TestResults.xcresult \
            | xcbeautify

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: macos-TestResults
          path: macos-TestResults.xcresult
